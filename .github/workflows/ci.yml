name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64  # no arm64 Windows builds

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install gcc (required for go-sqlite3 CGO — linux only)
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y gcc

      - name: Download dependencies
        run: go mod download

      - name: Vet
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go vet ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'linux' && '1' || '0' }}
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/openfleet-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: openfleet-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/openfleet-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 14
          if-no-files-found: error
