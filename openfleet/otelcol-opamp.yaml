## Example OpenTelemetry Collector config for use with OpenFleet
##
## This is the INITIAL config you place on the host running the OpAMP Supervisor.
## After the agent connects, OpenFleet will push your remote config templates
## and this file will be supplemented/replaced by whatever the server sends.
##
## Key points:
##   1. The opamp extension MUST be present here so the collector can connect.
##   2. After connecting, OpenFleet manages extensions.opamp automatically.
##   3. You should NOT include extensions.opamp in your OpenFleet templates —
##      the server always injects it. See README.md for details.

extensions:
  opamp:
    server:
      ws:
        endpoint: ws://127.0.0.1:8080/v1/opamp
        tls:
          insecure: true
    capabilities:
      reports_effective_config: true
      reports_health: true
      accepts_remote_config: true


receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: detailed

service:
  # The opamp extension MUST be listed here to activate it
  extensions: [opamp]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
